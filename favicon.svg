<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#3a6b4a"/>
  <!-- Gold border -->
  <rect x="6" y="6" width="500" height="500" rx="90" fill="none" stroke="#c5a95a" stroke-width="12"/>
  <!-- Grid lines (subtle) -->
  <line x1="180" y1="200" x2="430" y2="200" stroke="#4a7a5a" stroke-width="2" opacity=".4"/>
  <line x1="180" y1="260" x2="430" y2="260" stroke="#4a7a5a" stroke-width="2" opacity=".4"/>
  <line x1="180" y1="320" x2="430" y2="320" stroke="#4a7a5a" stroke-width="2" opacity=".4"/>
  <line x1="180" y1="380" x2="430" y2="380" stroke="#4a7a5a" stroke-width="2" opacity=".4"/>
  <line x1="260" y1="200" x2="260" y2="430" stroke="#4a7a5a" stroke-width="2" opacity=".4"/>
  <line x1="340" y1="200" x2="340" y2="430" stroke="#4a7a5a" stroke-width="2" opacity=".4"/>
  <!-- Bar chart -->
  <rect x="270" y="340" width="42" height="80" rx="6" fill="#00cc66" opacity=".85"/>
  <rect x="325" y="280" width="42" height="140" rx="6" fill="#d4a020" opacity=".85"/>
  <rect x="380" y="220" width="42" height="200" rx="6" fill="#b03040" opacity=".85"/>
  <!-- Checkmark -->
  <polyline points="100,260 190,360 360,150" fill="none" stroke="#ffffff" stroke-width="48" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
